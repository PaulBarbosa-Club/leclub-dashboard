name: Birthday Notification

on:
  schedule:
    # Tous les jours à 8h00 heure de Paris (6h00 UTC en été, 7h00 UTC en hiver)
    - cron: '0 7 * * *'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  check-birthdays:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check birthdays and notify
        run: python birthday_notif.py
